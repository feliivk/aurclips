# Tests en los tres SO que aurclips dice soportar. La suite corre sin GPU,
# sin ffmpeg y sin red, así que el runner pelado basta.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar aurclips con dependencias de test
        run: python -m pip install -e ".[dev]"
      - name: Correr la suite
        run: python -m pytest -q
